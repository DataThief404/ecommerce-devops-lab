name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

# ══════════════════════════════════════
# 1. TERRAFORM
# ══════════════════════════════════════
  terraform:
    name: Provision Infrastructure
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
      alb_dns: ${{ steps.export.outputs.alb_dns }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Instance IPs and ALB DNS
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r '.[]' | tr '\n' ' ')
          ALB=$(terraform output -raw alb_dns_name)
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB" >> $GITHUB_OUTPUT
          echo "✅ IPs: $IPS"
          echo "✅ ALB: $ALB"


# ══════════════════════════════════════
# 2. ANSIBLE
# ══════════════════════════════════════
  ansible:
    name: Configure Servers
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible jq

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Wait for EC2 Boot
        run: sleep 60

      - name: Build Inventory
        run: |
          echo "[web]" > inventory.ini
          for ip in ${{ needs.terraform.outputs.instance_ips }}; do
            echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=key.pem" >> inventory.ini
          done
          cat inventory.ini

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml \
            -e "repo_root=$GITHUB_WORKSPACE" -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Show App URL
        run: |
          echo "========================================"
          echo "✅ DEPLOYMENT COMPLETE!"
          echo "🌐 App URL: http://${{ needs.terraform.outputs.alb_dns }}"
          echo "========================================"


# ══════════════════════════════════════
# 3. DESTROY (manual trigger only)
# ══════════════════════════════════════
  destroy:
    name: Destroy Infrastructure
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve