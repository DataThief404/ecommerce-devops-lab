services:

  mongodb:
    image: mongo:5
    restart: always
    networks:
      - appnet

  app:
    image: node:18-alpine
    working_dir: /app/server
    volumes:
      - /app/server:/app/server
    command: sh -c "npm install && node server.js"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/shop
    depends_on:
      - mongodb
    networks:
      - appnet
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - /app/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - appnet

networks:
  appnet:
    driver: bridge